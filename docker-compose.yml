services:
  api:
    build: .
    container_name: minemen-club-api
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      # Set API_BASE_URL in .env if you use /v1/generator/:name.
      API_BASE_URL: ${API_BASE_URL:-http://localhost:4000}
    volumes:
      - api-data:/app/data
      - api-logs:/app/logs

volumes:
  api-data:
  api-logs:
